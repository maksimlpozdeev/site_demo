<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Инструменты OKLCH</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1c1f25;
    --line: #2b2f37;
    --text: #e8e6e1;
    --muted: #8b8f98;
    --accent: #ffb454;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", "SF Mono", "Consolas", monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    padding: 40px 20px;
    max-width: 560px;
    width: 100%;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 32px;
  }
  h1 span { color: var(--accent); }
  .card {
    display: block;
    text-decoration: none;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 16px;
    transition: border-color .15s ease, transform .15s ease;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .card-arrow {
    float: right;
    color: var(--accent);
    font-size: 18px;
    margin-top: -2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>OKLCH <span>Tools</span></h1>

  <a class="card" href="oklch-theme-configurator.html">
    <div class="card-arrow">→</div>
    <div class="card-title">Theme Configurator</div>
    <div class="card-desc">Настройка тем оформления на основе цветового пространства OKLCH</div>
  </a>

  <a class="card" href="oklch-palette.html">
    <div class="card-arrow">→</div>
    <div class="card-title">Palette — Ван дер Корпут</div>
    <div class="card-desc">Категориальная палитра с равномерным распределением оттенков по последовательности Ван дер Корпута</div>
  </a>
</div>
</body>
</html>
